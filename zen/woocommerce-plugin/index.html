<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZEN Plugin Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-family: 'Nunito', sans-serif;
      --color-accent: #22e243;
      --color-primary: #222222;
      --color-secondary: #727272;
      --color-surface-light: #f7f7f7;
      --color-surface-medium: #ebebeb;
      --color-surface-strong: #dfdfdf;
      --color-line-pattern: #dfdfdf;
      --color-background: #ffffff;
      --radius-32: 32px;
      --switcher-height: 72px;
    }

    html, body {
      height: 100%;
      font-family: var(--font-family);
      background: var(--color-surface-light);
    }

    /* ─── TOP BAR ─────────────────────────────────────────── */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--switcher-height);
      background: var(--color-background);
      border-bottom: 1px solid var(--color-line-pattern);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      z-index: 9999;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .topbar-logo {
      position: absolute;
      left: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-logo svg {
      width: 36px;
      height: 36px;
    }

    .topbar-logo span {
      font-size: 17px;
      font-weight: 800;
      color: var(--color-primary);
      letter-spacing: -0.3px;
    }

    /* ─── PILL SWITCHER ───────────────────────────────────── */
    .switcher {
      position: relative;
      display: flex;
      align-items: center;
      background: var(--color-surface-medium);
      border-radius: var(--radius-32);
      padding: 4px;
      gap: 2px;
    }

    .switcher-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 22px;
      border-radius: 28px;
      border: none;
      background: transparent;
      color: var(--color-secondary);
      font-family: var(--font-family);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
      white-space: nowrap;
      user-select: none;
    }

    .switcher-btn svg {
      flex-shrink: 0;
      transition: opacity 0.18s;
    }

    .switcher-btn:hover:not(.active) {
      background: rgba(34,34,34,0.06);
      color: var(--color-primary);
    }

    .switcher-btn.active {
      background: var(--color-primary);
      color: #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    .switcher-btn.active svg path,
    .switcher-btn.active svg rect,
    .switcher-btn.active svg circle {
      stroke: #ffffff;
    }

    .switcher-btn svg path,
    .switcher-btn svg rect,
    .switcher-btn svg circle {
      stroke: currentColor;
      transition: stroke 0.18s;
    }

    /* ─── BADGE ───────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .badge-admin {
      background: #fff3cd;
      color: #856404;
    }

    .badge-checkout {
      background: #d1f7da;
      color: #1a7a30;
    }

    /* ─── KEYFRAMES ──────────────────────────────────────── */
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(28px) scale(0.99); }
      to   { opacity: 1; transform: translateX(0)    scale(1); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-28px) scale(0.99); }
      to   { opacity: 1; transform: translateX(0)     scale(1); }
    }
    @keyframes slideOutLeft {
      from { opacity: 1; transform: translateX(0)     scale(1); }
      to   { opacity: 0; transform: translateX(-28px) scale(0.99); }
    }
    @keyframes slideOutRight {
      from { opacity: 1; transform: translateX(0)    scale(1); }
      to   { opacity: 0; transform: translateX(28px) scale(0.99); }
    }
    @keyframes loaderSpin {
      to { transform: rotate(360deg); }
    }
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }
    @keyframes btnPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(0.93); }
      100% { transform: scale(1); }
    }
    @keyframes nudge {
      0%, 100% { transform: translateX(0); }
      20%      { transform: translateX(3px); }
      40%      { transform: translateX(-2px); }
      60%      { transform: translateX(2px); }
      80%      { transform: translateX(-1px); }
    }
    @keyframes hintFadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes hintFadeOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-4px); }
    }
    @keyframes softPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34,34,34,0); }
      50%      { box-shadow: 0 0 0 6px rgba(34,34,34,0.08); }
    }

    /* ─── TAB HINT ────────────────────────────────────────── */
    .switcher-hint {
      position: absolute;
      top: calc(100% + 10px);
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--color-primary);
      color: #fff;
      font-family: var(--font-family);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 10000;
      animation: hintFadeIn 0.35s ease forwards;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .switcher-hint::before {
      content: '';
      position: absolute;
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 6px solid var(--color-primary);
    }

    .switcher-hint.fade-out {
      animation: hintFadeOut 0.35s ease forwards;
    }

    .switcher-hint svg {
      flex-shrink: 0;
    }

    .switcher-btn.nudge-anim {
      animation: nudge 0.5s ease;
    }

    .switcher-btn.pulse-anim:not(.active) {
      animation: softPulse 1.8s ease infinite;
    }

    /* ─── IFRAME CONTAINER ────────────────────────────────── */
    .frame-wrapper {
      position: fixed;
      top: var(--switcher-height);
      left: 0;
      right: 0;
      bottom: 0;
      display: none;
      opacity: 0;
    }

    .frame-wrapper.visible {
      display: block;
    }

    .frame-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ─── LOADER OVERLAY ──────────────────────────────────── */
    .frame-loader {
      position: absolute;
      inset: 0;
      background: var(--color-surface-light);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .frame-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--color-surface-strong);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: loaderSpin 0.7s linear infinite;
    }

    .loader-skeleton {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: min(480px, 80vw);
    }

    .skeleton-bar {
      border-radius: 8px;
      background: linear-gradient(90deg, #e8e8e8 25%, #f5f5f5 50%, #e8e8e8 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite linear;
    }

    /* ─── SWITCHER BUTTON PRESS ───────────────────────────── */
    .switcher-btn:active {
      animation: btnPop 0.18s ease forwards;
    }

    /* ─── VIEW LABEL (bottom left corner) ─────────────────── */
    .view-label {
      position: fixed;
      bottom: 16px;
      left: 16px;
      background: rgba(34,34,34,0.82);
      backdrop-filter: blur(4px);
      color: #fff;
      font-family: var(--font-family);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      z-index: 9998;
      pointer-events: none;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .view-label.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ─── MOBILE ──────────────────────────────────────────── */
    @media (max-width: 768px) {
      .topbar-logo { display: none; }
      .topbar { gap: 0; padding: 0 8px; }
    }

    @media (max-width: 480px) {
      :root { --switcher-height: 52px; }
      .topbar { gap: 0; padding: 0 6px; }
      .switcher { padding: 3px; width: calc(100% - 12px); }
      .switcher-btn { font-size: 12px; padding: 6px 10px; gap: 5px; flex: 1; justify-content: center; }
      .switcher-btn svg { width: 13px; height: 13px; }
      .badge { display: none; }
      .view-label { left: 8px; bottom: 8px; font-size: 11px; padding: 4px 10px; }
    }

  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <!-- Logo -->
    <div class="topbar-logo">
            <span>ZEN.COM Woocommerce Plugin</span>
    </div>

    <!-- Pill switcher -->
    <div class="switcher" role="tablist">
      <button class="switcher-btn active" id="btn-checkout" role="tab" aria-selected="true" onclick="switchView('checkout')">
        <!-- Cart icon -->
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 1h2l1.68 8.39a1.33 1.33 0 0 0 1.32 1.11h6.47a1.33 1.33 0 0 0 1.31-1.1L14.6 4H4" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="6" cy="13.67" r="1" stroke-width="1.4"/>
          <circle cx="12" cy="13.67" r="1" stroke-width="1.4"/>
        </svg>
        Checkout sklepu
        <span class="badge badge-checkout">WooCommerce</span>
      </button>

      <button class="switcher-btn" id="btn-admin" role="tab" aria-selected="false" onclick="switchView('admin')">
        <!-- Settings icon -->
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13.3 9.9a1.1 1.1 0 0 0 .22 1.21l.04.04a1.33 1.33 0 1 1-1.88 1.88l-.04-.04a1.1 1.1 0 0 0-1.21-.22 1.1 1.1 0 0 0-.67 1.01V14a1.33 1.33 0 0 1-2.67 0v-.06A1.1 1.1 0 0 0 6.37 13a1.1 1.1 0 0 0-1.21.22l-.04.04a1.33 1.33 0 1 1-1.88-1.88l.04-.04A1.1 1.1 0 0 0 3.5 10.1a1.1 1.1 0 0 0-1.01-.67H2a1.33 1.33 0 0 1 0-2.67h.06A1.1 1.1 0 0 0 3 5.63a1.1 1.1 0 0 0-.22-1.21l-.04-.04a1.33 1.33 0 1 1 1.88-1.88l.04.04A1.1 1.1 0 0 0 5.87 2.76a1.1 1.1 0 0 0 .67-1.01V1.67a1.33 1.33 0 0 1 2.67 0v.06a1.1 1.1 0 0 0 .67 1.01 1.1 1.1 0 0 0 1.21-.22l.04-.04a1.33 1.33 0 1 1 1.88 1.88l-.04.04A1.1 1.1 0 0 0 12.75 5.63a1.1 1.1 0 0 0 1.01.67H14a1.33 1.33 0 0 1 0 2.67h-.06a1.1 1.1 0 0 0-1.01.67v0Z" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Panel administracyjny
        <span class="badge badge-admin">WP Admin</span>
      </button>
    </div>
  </div>

  <!-- CHECKOUT FRAME -->
  <div class="frame-wrapper visible" id="frame-checkout">
    <div class="frame-loader" id="loader-checkout">
      <div class="loader-spinner"></div>
      <div class="loader-skeleton">
        <div class="skeleton-bar" style="height:18px;width:55%"></div>
        <div class="skeleton-bar" style="height:14px;width:80%"></div>
        <div class="skeleton-bar" style="height:14px;width:68%"></div>
        <div class="skeleton-bar" style="height:48px;width:100%;margin-top:8px;border-radius:12px"></div>
      </div>
    </div>
    <iframe src="checkout.html" title="Checkout sklepu ZEN – WooCommerce" onload="hideLoader('loader-checkout')"></iframe>
  </div>

  <!-- ADMIN PANEL FRAME -->
  <div class="frame-wrapper" id="frame-admin">
    <div class="frame-loader" id="loader-admin">
      <div class="loader-spinner"></div>
      <div class="loader-skeleton">
        <div class="skeleton-bar" style="height:18px;width:45%"></div>
        <div class="skeleton-bar" style="height:14px;width:75%"></div>
        <div class="skeleton-bar" style="height:14px;width:60%"></div>
        <div class="skeleton-bar" style="height:48px;width:100%;margin-top:8px;border-radius:12px"></div>
      </div>
    </div>
    <iframe src="woocommerce-settings.html" title="Panel administracyjny ZEN – WooCommerce Settings" onload="hideLoader('loader-admin')"></iframe>
  </div>

  <!-- VIEW LABEL -->
  <div class="view-label" id="view-label"></div>

  <script>
    let currentView = 'checkout';
    let isAnimating = false;
    let labelTimer = null;

    // Order determines animation direction (left → right)
    const viewOrder = ['checkout', 'admin'];

    const views = {
      admin: {
        frameId:  'frame-admin',
        btnId:    'btn-admin',
        label:    '⚙️ Panel administracyjny wtyczki ZEN'
      },
      checkout: {
        frameId:  'frame-checkout',
        btnId:    'btn-checkout',
        label:    '🛒 Checkout sklepu WooCommerce'
      }
    };

    const DURATION = 210; // ms — keep in sync with animation durations

    function switchView(target) {
      if (target === currentView || isAnimating) return;
      isAnimating = true;

      const goingRight = viewOrder.indexOf(target) > viewOrder.indexOf(currentView);
      const prev = views[currentView];
      const next = views[target];

      const prevFrame = document.getElementById(prev.frameId);
      const nextFrame = document.getElementById(next.frameId);

      // ── 1. Exit current frame ──────────────────────────────
      prevFrame.style.animation = `${goingRight ? 'slideOutLeft' : 'slideOutRight'} ${DURATION}ms ease forwards`;

      // ── 2. Prepare & show next frame (off-screen, no flash) ─
      nextFrame.style.opacity = '0';
      nextFrame.style.animation = 'none';
      nextFrame.classList.add('visible');

      setTimeout(() => {
        // ── 3. Hide prev, animate in next ─────────────────────
        prevFrame.classList.remove('visible');
        prevFrame.style.animation = '';
        prevFrame.style.opacity = '0';

        nextFrame.style.animation = `${goingRight ? 'slideInRight' : 'slideInLeft'} ${DURATION}ms ease forwards`;

        setTimeout(() => {
          nextFrame.style.animation = '';
          nextFrame.style.opacity = '1';
          isAnimating = false;
        }, DURATION);
      }, DURATION);

      // ── 4. Update switcher buttons immediately ─────────────
      document.getElementById(prev.btnId).classList.remove('active');
      document.getElementById(prev.btnId).setAttribute('aria-selected', 'false');
      document.getElementById(next.btnId).classList.add('active');
      document.getElementById(next.btnId).setAttribute('aria-selected', 'true');

      currentView = target;
      showLabel(next.label);

      // Dismiss hint on first switch
      dismissHint();
    }

    function hideLoader(id) {
      const loader = document.getElementById(id);
      if (!loader) return;
      loader.classList.add('hidden');
      setTimeout(() => loader.remove(), 350);
    }

    function showLabel(text) {
      const el = document.getElementById('view-label');
      el.textContent = text;
      el.classList.add('show');
      if (labelTimer) clearTimeout(labelTimer);
      labelTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }

    // ── Hint system ────────────────────────────────────────
    let hintEl = null;
    let hintDismissed = false;

    function showHint() {
      if (hintDismissed) return;

      const inactiveBtn = document.getElementById('btn-admin');
      inactiveBtn.classList.add('pulse-anim');

      // Create tooltip under the switcher
      hintEl = document.createElement('div');
      hintEl.className = 'switcher-hint';
      hintEl.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>Przełącz widok';
      document.querySelector('.switcher').appendChild(hintEl);

      // Nudge the inactive button once
      setTimeout(() => {
        inactiveBtn.classList.add('nudge-anim');
        inactiveBtn.addEventListener('animationend', () => {
          inactiveBtn.classList.remove('nudge-anim');
        }, { once: true });
      }, 600);

      // Auto-dismiss after 5s
      setTimeout(() => dismissHint(), 5000);
    }

    function dismissHint() {
      if (hintDismissed) return;
      hintDismissed = true;

      document.getElementById('btn-admin').classList.remove('pulse-anim');

      if (hintEl) {
        hintEl.classList.add('fade-out');
        setTimeout(() => { if (hintEl.parentNode) hintEl.remove(); }, 400);
      }
    }

    // ── Init ───────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      const initFrame = document.getElementById(views[currentView].frameId);
      initFrame.style.animation = `slideInRight ${DURATION + 80}ms ease forwards`;
      setTimeout(() => {
        initFrame.style.animation = '';
        initFrame.style.opacity = '1';
      }, DURATION + 80);

      // Show tab hint after 2s
      setTimeout(showHint, 2000);
    });
  </script>
</body>
</html>
