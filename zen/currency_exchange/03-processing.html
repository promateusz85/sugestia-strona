<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ZEN — Exchange</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .phone { overflow: hidden; }

    /* Navbar */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 0 16px;
    }
    .navbar-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--color-primary);
      white-space: nowrap;
    }
    /* Close button — hidden during processing, fades in on success */
    .navbar-close {
      position: absolute;
      left: 10px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease-out;
    }
    .navbar-close.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* Hero stage — absolute so text block can slide in below canvas */
    .hero-stage {
      position: absolute;
      top: 88px;
      left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    /* Rive canvas */
    #riveCanvas {
      display: block;
      width: 375px;
      height: 240px;
      flex-shrink: 0;
    }
    /* Hide the halo/ring at the very top of the success frame */
    #riveCanvas.success {
      -webkit-mask-image: linear-gradient(to bottom,
        transparent 0px,
        transparent 38px,
        black 62px,
        black 100%);
      mask-image: linear-gradient(to bottom,
        transparent 0px,
        transparent 38px,
        black 62px,
        black 100%);
    }

    /* ── CSS Fallback (shows if Rive fails to load) ── */
    #fallback {
      display: none;
      width: 375px;
      height: 240px;
      flex-shrink: 0;
      position: relative;
      overflow: visible;
    }
    .fb-wrap {
      animation: fbFloat 2.2s ease-in-out infinite;
      position: absolute;
      left: 50%; top: 0;
      transform: translateX(-50%);
    }
    @keyframes fbFloat {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-12px); }
    }

    /* ── Success text block — hidden until animation completes ── */
    .text-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 315px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition: opacity 0.5s ease-out, transform 0.5s ease-out;
    }
    .text-block.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .done-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--color-primary);
      line-height: 33px;
    }
    .done-subtitle {
      font-size: 17px;
      font-weight: 600;
      color: #727272;
      line-height: 23px;
    }

    /* ── CTA bar — pinned to bottom, hidden until success ── */
    .cta-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 20px 20px 40px;
      background: var(--color-surface);
      display: flex;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(20px);
      transition: opacity 0.5s ease-out, transform 0.5s ease-out;
    }
    .cta-bar.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .cta-ok {
      width: 240px;
      height: 60px;
      border-radius: 32px;
      border: 2px solid var(--color-primary);
      background: transparent;
      color: var(--color-primary);
      font-family: inherit;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.14s, color 0.14s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
    }
    .cta-ok:hover  { background: var(--color-primary); color: white; }
    .cta-ok:active { transform: scale(0.98); }
  </style>
</head>
<body>

<div class="phone">

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0"    y="5"   width="3" height="7"    rx="1" fill="#222"/>
        <rect x="4.5"  y="3.5" width="3" height="8.5"  rx="1" fill="#222"/>
        <rect x="9"    y="1.5" width="3" height="10.5" rx="1" fill="#222"/>
        <rect x="13.5" y="0"   width="3" height="12"   rx="1" fill="#222"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 3.5C9.9 3.5 11.6 4.3 12.9 5.5L14.2 4.1C12.5 2.5 10.4 1.5 8 1.5C5.6 1.5 3.5 2.5 1.8 4.1L3.1 5.5C4.4 4.3 6.1 3.5 8 3.5Z" fill="#222"/>
        <path d="M8 6.5C9.2 6.5 10.3 7 11.1 7.9L12.4 6.5C11.2 5.3 9.7 4.5 8 4.5C6.3 4.5 4.8 5.3 3.6 6.5L4.9 7.9C5.7 7 6.8 6.5 8 6.5Z" fill="#222"/>
        <circle cx="8" cy="10.5" r="1.5" fill="#222"/>
      </svg>
      <svg width="26" height="12" viewBox="0 0 26 12" fill="none">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#222" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="18" height="8" rx="2" fill="#222"/>
        <path d="M23.5 4V8C24.4 7.4 25 6.7 25 6C25 5.3 24.4 4.6 23.5 4Z" fill="#222" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Navbar: close button appears on success -->
  <div class="navbar">
    <button class="navbar-close" id="navClose" onclick="handleDone()" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M2 2L16 16M16 2L2 16" stroke="#222" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
    <span class="navbar-title">Exchange</span>
  </div>

  <!-- Hero stage: canvas + success text (text hidden initially) -->
  <div class="hero-stage">

    <!-- Rive canvas -->
    <canvas id="riveCanvas" width="375" height="240"></canvas>

    <!-- CSS fallback (shown when Rive can't load) -->
    <div id="fallback">
      <div class="fb-wrap">
        <svg viewBox="0 0 375 240" width="375" height="240" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <pattern id="hatchPat" x="0" y="0" width="8" height="8"
                     patternTransform="rotate(-45 0 0)" patternUnits="userSpaceOnUse">
              <line x1="0" y1="0" x2="0" y2="8" stroke="white" stroke-width="3.2"/>
            </pattern>
            <clipPath id="balloonClip">
              <circle cx="181" cy="79" r="52"/>
            </clipPath>
          </defs>
          <line x1="-10" y1="128" x2="72" y2="128" stroke="#222" stroke-width="1.5" stroke-dasharray="6,4"/>
          <path d="M72,128 Q72,113 88,113 Q91,98 108,98 Q126,98 126,113 Q138,111 138,124 Q138,128 130,128 Z"
                fill="none" stroke="#222" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
          <line x1="130" y1="128" x2="162" y2="128" stroke="#222" stroke-width="1.5" stroke-dasharray="6,4"/>
          <line x1="228" y1="60" x2="256" y2="60" stroke="#222" stroke-width="1.5" stroke-dasharray="6,4"/>
          <path d="M256,60 Q256,47 268,47 Q272,36 285,36 Q300,36 300,49 Q310,48 310,59 Q310,68 302,68 Q256,68 256,60 Z"
                fill="none" stroke="#222" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
          <line x1="302" y1="60" x2="385" y2="60" stroke="#222" stroke-width="1.5" stroke-dasharray="6,4"/>
          <circle cx="181" cy="79" r="52" fill="#e4e4e4"/>
          <circle cx="181" cy="79" r="52" fill="url(#hatchPat)" clip-path="url(#balloonClip)"/>
          <circle cx="137" cy="129" r="9" fill="#222"/>
          <circle cx="225" cy="129" r="9" fill="#222"/>
          <circle cx="181" cy="154" r="37" fill="#222"/>
          <ellipse cx="183" cy="138" rx="28" ry="21" fill="white"/>
          <circle cx="175" cy="134" r="3.5" fill="#222"/>
          <circle cx="191" cy="134" r="3.5" fill="#222"/>
          <ellipse cx="181" cy="204" rx="28" ry="4.5" fill="#ececec"/>
        </svg>
      </div>
    </div>

    <!-- Success text — fades in after animation -->
    <div class="text-block" id="successText">
      <div class="done-title">Exchange done!</div>
      <div class="done-subtitle">The money should be now<br>in your Wallet.</div>
    </div>

  </div>

  <!-- CTA bar — fades in after animation -->
  <div class="cta-bar" id="ctaBar">
    <button class="cta-ok" onclick="handleDone()">OK</button>
  </div>

  <div class="toast" id="toast"></div>

</div><!-- /phone -->

<!-- Rive runtime (canvas renderer) -->
<script src="https://unpkg.com/@rive-app/canvas@2.21.6/rive.js"></script>
<script src="shared.js"></script>
<script>
  const RIVE_SRC = 'transfer-hero.riv';
  const canvas   = document.getElementById('riveCanvas');
  const fallback = document.getElementById('fallback');

  function showFallback() {
    canvas.style.display   = 'none';
    fallback.style.display = 'block';
  }

  // ── State flags ──
  let successShown     = false;
  let transitionStarted = false;
  function showSuccessUI() {
    if (successShown) return;
    successShown = true;
    canvas.classList.add('success');
    document.getElementById('successText').classList.add('visible');
    document.getElementById('ctaBar').classList.add('visible');
    document.getElementById('navClose').classList.add('visible');
  }

  // ── Rive ──
  let riveInst;
  try {
    riveInst = new rive.Rive({
      src:           RIVE_SRC,
      canvas:        canvas,
      autoplay:      true,
      stateMachines: 'transferSuccess_SM',

      onLoad() {
        riveInst.resizeDrawingSurfaceToCanvas();

        // After 5s: trigger the success animation on the SAME running instance
        setTimeout(() => {
          transitionStarted = true;
          riveInst.play('transfer is on');
        }, 5000);
      },

      onStop(event) {
        // 'transfer is on' is a one-shot — fires onStop, not onLoop
        if (event.data && event.data.includes('transfer is on')) {
          riveInst.pause();
          showSuccessUI();
        }
      },

      onLoadError() { showFallback(); }
    });
  } catch (e) {
    showFallback();
  }

  // ── Navigation ──
  function handleDone() {
    sessionStorage.removeItem('zen_fx');
    navigate('01-amount.html', 'exit-right', 'enter-left');
  }

  // Dev shortcut: dblclick during pending phase → error screen
  document.querySelector('.phone').addEventListener('dblclick', () => {
    if (!transitionStarted && !successShown) {
      navigate('05-error.html', 'exit-fade', 'enter-fade');
    }
  });
</script>

</body>
</html>
