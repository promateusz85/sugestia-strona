<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZEN Plugin Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-family: 'Nunito', sans-serif;
      --color-accent: #22e243;
      --color-primary: #222222;
      --color-secondary: #727272;
      --color-surface-light: #f7f7f7;
      --color-surface-medium: #ebebeb;
      --color-surface-strong: #dfdfdf;
      --color-line-pattern: #dfdfdf;
      --color-background: #ffffff;
      --radius-32: 32px;
      --switcher-height: 72px;
    }

    html, body {
      height: 100%;
      font-family: var(--font-family);
      background: var(--color-surface-light);
    }

    /* ─── TOP BAR ─────────────────────────────────────────── */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--switcher-height);
      background: var(--color-background);
      border-bottom: 1px solid var(--color-line-pattern);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      z-index: 9999;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .topbar-logo {
      position: absolute;
      left: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-logo svg {
      width: 36px;
      height: 36px;
    }

    .topbar-logo span {
      font-size: 17px;
      font-weight: 800;
      color: var(--color-primary);
      letter-spacing: -0.3px;
    }

    /* ─── PILL SWITCHER ───────────────────────────────────── */
    .switcher {
      display: flex;
      align-items: center;
      background: var(--color-surface-medium);
      border-radius: var(--radius-32);
      padding: 4px;
      gap: 2px;
    }

    .switcher-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 22px;
      border-radius: 28px;
      border: none;
      background: transparent;
      color: var(--color-secondary);
      font-family: var(--font-family);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
      white-space: nowrap;
      user-select: none;
    }

    .switcher-btn svg {
      flex-shrink: 0;
      transition: opacity 0.18s;
    }

    .switcher-btn:hover:not(.active) {
      background: rgba(34,34,34,0.06);
      color: var(--color-primary);
    }

    .switcher-btn.active {
      background: var(--color-primary);
      color: #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    .switcher-btn.active svg path,
    .switcher-btn.active svg rect,
    .switcher-btn.active svg circle {
      stroke: #ffffff;
    }

    .switcher-btn svg path,
    .switcher-btn svg rect,
    .switcher-btn svg circle {
      stroke: currentColor;
      transition: stroke 0.18s;
    }

    /* ─── BADGE ───────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .badge-admin {
      background: #fff3cd;
      color: #856404;
    }

    .badge-checkout {
      background: #d1f7da;
      color: #1a7a30;
    }

    /* ─── IFRAME CONTAINER ────────────────────────────────── */
    .frame-wrapper {
      position: fixed;
      top: var(--switcher-height);
      left: 0;
      right: 0;
      bottom: 0;
      display: none;
    }

    .frame-wrapper.visible {
      display: block;
    }

    .frame-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ─── FADE TRANSITION ─────────────────────────────────── */
    .frame-wrapper {
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    .frame-wrapper.visible {
      display: block;
      opacity: 1;
    }

    /* ─── VIEW LABEL (bottom left corner) ─────────────────── */
    .view-label {
      position: fixed;
      bottom: 16px;
      left: 16px;
      background: rgba(34,34,34,0.82);
      backdrop-filter: blur(4px);
      color: #fff;
      font-family: var(--font-family);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      z-index: 9998;
      pointer-events: none;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .view-label.show {
      opacity: 1;
      transform: translateY(0);
    }

  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <!-- Logo -->
    <div class="topbar-logo">
            <span>ZEN.COM Woocommerce Plugin</span>
    </div>

    <!-- Pill switcher -->
    <div class="switcher" role="tablist">
      <button class="switcher-btn active" id="btn-admin" role="tab" aria-selected="true" onclick="switchView('admin')">
        <!-- Settings icon -->
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13.3 9.9a1.1 1.1 0 0 0 .22 1.21l.04.04a1.33 1.33 0 1 1-1.88 1.88l-.04-.04a1.1 1.1 0 0 0-1.21-.22 1.1 1.1 0 0 0-.67 1.01V14a1.33 1.33 0 0 1-2.67 0v-.06A1.1 1.1 0 0 0 6.37 13a1.1 1.1 0 0 0-1.21.22l-.04.04a1.33 1.33 0 1 1-1.88-1.88l.04-.04A1.1 1.1 0 0 0 3.5 10.1a1.1 1.1 0 0 0-1.01-.67H2a1.33 1.33 0 0 1 0-2.67h.06A1.1 1.1 0 0 0 3 5.63a1.1 1.1 0 0 0-.22-1.21l-.04-.04a1.33 1.33 0 1 1 1.88-1.88l.04.04A1.1 1.1 0 0 0 5.87 2.76a1.1 1.1 0 0 0 .67-1.01V1.67a1.33 1.33 0 0 1 2.67 0v.06a1.1 1.1 0 0 0 .67 1.01 1.1 1.1 0 0 0 1.21-.22l.04-.04a1.33 1.33 0 1 1 1.88 1.88l-.04.04A1.1 1.1 0 0 0 12.75 5.63a1.1 1.1 0 0 0 1.01.67H14a1.33 1.33 0 0 1 0 2.67h-.06a1.1 1.1 0 0 0-1.01.67v0Z" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Panel administracyjny
        <span class="badge badge-admin">WP Admin</span>
      </button>

      <button class="switcher-btn" id="btn-checkout" role="tab" aria-selected="false" onclick="switchView('checkout')">
        <!-- Cart icon -->
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 1h2l1.68 8.39a1.33 1.33 0 0 0 1.32 1.11h6.47a1.33 1.33 0 0 0 1.31-1.1L14.6 4H4" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="6" cy="13.67" r="1" stroke-width="1.4"/>
          <circle cx="12" cy="13.67" r="1" stroke-width="1.4"/>
        </svg>
        Checkout sklepu
        <span class="badge badge-checkout">WooCommerce</span>
      </button>
    </div>
  </div>

  <!-- ADMIN PANEL FRAME -->
  <div class="frame-wrapper visible" id="frame-admin">
    <iframe src="WooCommerce_ZEN_settings_v16.html" title="Panel administracyjny ZEN – WooCommerce Settings"></iframe>
  </div>

  <!-- CHECKOUT FRAME -->
  <div class="frame-wrapper" id="frame-checkout">
    <iframe src="checkout_zen_v5.html" title="Checkout sklepu ZEN – WooCommerce"></iframe>
  </div>

  <!-- VIEW LABEL -->
  <div class="view-label" id="view-label"></div>

  <script>
    let currentView = 'admin';
    let labelTimer = null;

    const views = {
      admin: {
        frameId: 'frame-admin',
        btnId: 'btn-admin',
        label: '⚙️ Panel administracyjny wtyczki ZEN'
      },
      checkout: {
        frameId: 'frame-checkout',
        btnId: 'btn-checkout',
        label: '🛒 Checkout sklepu WooCommerce'
      }
    };

    function switchView(target) {
      if (target === currentView) return;

      const prev = views[currentView];
      const next = views[target];

      // Hide current
      const prevFrame = document.getElementById(prev.frameId);
      prevFrame.style.opacity = '0';
      setTimeout(() => {
        prevFrame.classList.remove('visible');
      }, 220);

      // Show next
      const nextFrame = document.getElementById(next.frameId);
      nextFrame.classList.add('visible');
      // Force reflow then fade in
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          nextFrame.style.opacity = '1';
        });
      });

      // Update buttons
      document.getElementById(prev.btnId).classList.remove('active');
      document.getElementById(prev.btnId).setAttribute('aria-selected', 'false');
      document.getElementById(next.btnId).classList.add('active');
      document.getElementById(next.btnId).setAttribute('aria-selected', 'true');

      currentView = target;

      // Show floating label briefly
      showLabel(next.label);
    }

    function showLabel(text) {
      const el = document.getElementById('view-label');
      el.textContent = text;
      el.classList.add('show');
      if (labelTimer) clearTimeout(labelTimer);
      labelTimer = setTimeout(() => {
        el.classList.remove('show');
      }, 2200);
    }
  </script>
</body>
</html>
